{% extends 'base.html' %}

{% block titulo %}
Nueva Visita
{% endblock %}


{% block contenido %}


<div class="container py-4">


    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold mb-1">

                <i class="bi bi-geo-alt-fill text-primary"></i>

                Nueva Visita

            </h2>

            <p class="text-muted mb-0">
                Registra la actividad realizada con el cliente.
            </p>

        </div>


        <a href="{{ url_for('visitas') }}"
           class="btn btn-secondary rounded-pill">

            <i class="bi bi-arrow-left"></i>

            Regresar

        </a>

    </div>





    <div class="card shadow-sm border-0 rounded-4">


        <div class="card-body p-4">


            <form method="POST"
                  enctype="multipart/form-data">



                <!-- CLIENTE -->

                <div class="mb-4">


                    <label class="form-label fw-semibold">

                        <i class="bi bi-person-fill text-primary"></i>

                        Cliente

                    </label>


                    <input

                        type="text"

                        id="cliente_busqueda"

                        class="form-control"

                        list="clientesList"

                        placeholder="Buscar por número o nombre"

                        autocomplete="off"

                        required>


                    <datalist id="clientesList">


                        {% for cliente in clientes %}


                        <option value="{{ cliente.num_cliente }} - {{ cliente.nombre }}">


                        {% endfor %}


                    </datalist>



                    <input

                        type="hidden"

                        name="cliente_id"

                        id="cliente_id">



                </div>






                <!-- OBSERVACIONES -->


                <div class="mb-4">


                    <label class="form-label fw-semibold">


                        <i class="bi bi-chat-left-text text-primary"></i>

                        Observaciones


                    </label>



                    <textarea

                        name="observaciones"

                        class="form-control"

                        rows="4"

                        placeholder="Describe la visita realizada..."></textarea>



                </div>






                <div class="row">



                    <!-- VENTA -->


                    <div class="col-md-6 mb-4">


                        <div class="card bg-light border-0">


                            <div class="card-body">


                                <label class="form-check">


                                    <input

                                        type="checkbox"

                                        name="venta_realizada"

                                        class="form-check-input"

                                        id="venta">


                                    <span class="form-check-label fw-semibold">

                                        ¿Hubo venta?

                                    </span>


                                </label>



                            </div>


                        </div>


                    </div>






                    <!-- MONTO -->


                    <div class="col-md-6 mb-4">


                        <label class="form-label fw-semibold">

                            <i class="bi bi-cash text-success"></i>

                            Monto Venta

                        </label>



                        <input

                            type="number"

                            step="0.01"

                            min="0"

                            name="monto_venta"

                            class="form-control"

                            placeholder="0.00">


                    </div>



                </div>







                <!-- FOTO -->


                <div class="mb-4">


                    <label class="form-label fw-semibold">


                        <i class="bi bi-camera-fill text-primary"></i>

                        Foto Evidencia


                    </label>



                    <input

                        type="file"

                        name="foto"

                        accept="image/*"

                        class="form-control">



                    <small class="text-muted">

                        Imagen opcional de evidencia.

                    </small>



                </div>







                <!-- PROXIMA VISITA -->


                <div class="mb-4">


                    <label class="form-label fw-semibold">


                        <i class="bi bi-calendar-event text-primary"></i>

                        Próxima Visita


                    </label>



                    <input

                        type="date"

                        name="proxima_visita"

                        class="form-control"

                        required>



                </div>






                <!-- GPS -->

                <input

                    type="hidden"

                    name="latitud"

                    id="latitud">


                <input

                    type="hidden"

                    name="longitud"

                    id="longitud">






                <button

                    type="submit"

                    class="btn btn-success px-4 rounded-pill">


                    <i class="bi bi-check-circle"></i>

                    Guardar Visita


                </button>



            </form>



        </div>


    </div>



</div>





<script>


// Obtener ubicación GPS

navigator.geolocation.getCurrentPosition(


    function(posicion){


        document.getElementById("latitud").value =
            posicion.coords.latitude;


        document.getElementById("longitud").value =
            posicion.coords.longitude;


    },


    function(error){


        console.log(
            "No fue posible obtener ubicación GPS"
        );


    }


);





// Clientes para identificar ID


const clientes = [


{% for cliente in clientes %}


{

    id: "{{ cliente.id }}",

    texto:
    "{{ cliente.num_cliente }} - {{ cliente.nombre }}"

},


{% endfor %}


];





const buscador =
document.getElementById("cliente_busqueda");


const clienteId =
document.getElementById("cliente_id");





buscador.addEventListener(
"input",
function(){


    const valor =
    this.value.trim();



    const cliente =
    clientes.find(
        c => c.texto === valor
    );



    if(cliente){


        clienteId.value =
        cliente.id;


    }else{


        clienteId.value =
        "";


    }



});







// Validar cliente


document.querySelector("form")
.addEventListener(
"submit",
function(e){



    if(clienteId.value === ""){


        alert(
            "Debe seleccionar un cliente válido de la lista."
        );


        e.preventDefault();


    }



});



</script>



{% endblock %}
