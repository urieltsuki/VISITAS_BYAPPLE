
{% extends 'base.html' %}

{% block contenido %}

<div class="container mt-4">

    <h2 class="mb-4">
        Nuevo Objetivo
    </h2>


    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Usuario
            </label>

            <select 
                name="usuario_id" 
                class="form-select"
                required>

                <option value="">
                    Seleccione un usuario
                </option>

                {% for u in usuarios %}

                <option value="{{ u.id }}">
                    {{ u.nombre }}
                </option>

                {% endfor %}

            </select>

        </div>



        <div class="mb-3">

            <label class="form-label">
                Año
            </label>

            <input
                type="number"
                name="anio"
                class="form-control"
                value="{{ anio_actual or '' }}"
                min="2020"
                required
            >

        </div>



        <div class="mb-3">

            <label class="form-label">
                Mes
            </label>

            <input
                type="number"
                name="mes"
                class="form-control"
                min="1"
                max="12"
                required
            >

        </div>



        <div class="mb-3">

            <label class="form-label">
                Objetivo
            </label>

            <input
                type="number"
                step="0.01"
                min="0"
                name="objetivo"
                class="form-control"
                placeholder="Ejemplo: 50000"
                required
            >

        </div>



        <button 
            type="submit"
            class="btn btn-success">

            Guardar

        </button>


        <a 
            href="{{ url_for('objetivos') }}"
            class="btn btn-secondary">

            Cancelar

        </a>


    </form>

</div>


{% endblock %}
