{% extends 'base.html' %}

{% block titulo %}
Cambiar Contraseña
{% endblock %}

{% block contenido %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card">

            <div class="card-header">

                <h4>
                    Cambiar Contraseña
                </h4>

            </div>

            <div class="card-body">

                {% if mensaje %}

                <div class="alert alert-info">

                    {{ mensaje }}

                </div>

                {% endif %}

                <form method="POST">

                    <div class="mb-3">

                        <label>
                            Contraseña Actual
                        </label>

                        <input
                            type="password"
                            name="password_actual"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>
                            Nueva Contraseña
                        </label>

                        <input
                            type="password"
                            name="nueva_password"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>
                            Confirmar Contraseña
                        </label>

                        <input
                            type="password"
                            name="confirmar_password"
                            class="form-control"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-success">

                        Guardar Cambios

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
