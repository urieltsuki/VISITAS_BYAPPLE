{% extends 'base.html' %}

{% block titulo %}
Usuarios
{% endblock %}

{% block contenido %}

<h2>Administración de Usuarios</h2>

<div class="card mb-4">

    <div class="card-body">

        <form method="POST">

            <div class="row">

                <div class="col-md-3">

                    <label>Nombre</label>

                    <input
                        type="text"
                        name="nombre"
                        class="form-control"
                        required>

                </div>

                <div class="col-md-3">

                    <label>Correo</label>

                    <input
                        type="email"
                        name="correo"
                        class="form-control"
                        required>

                </div>

                <div class="col-md-3">

                    <label>Contraseña</label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required>

                </div>

                <div class="col-md-2">

                    <label>Rol</label>

                    <select
                        name="rol"
                        class="form-control">

                        <option value="vendedor">
                            Vendedor
                        </option>

                        <option value="admin">
                            Administrador
                        </option>

                    </select>

                </div>

                <div class="col-md-1 d-flex align-items-end">

                    <button
                        class="btn btn-success">
                        Guardar
                    </button>

                </div>

            </div>

        </form>

    </div>

</div>

<div class="table-responsive">

    <table class="table table-striped table-bordered">

        <thead class="table-dark">

            <tr>

                <th>Nombre</th>
                <th>Correo</th>
                <th>Rol</th>
                <th>Acciones</th>

            </tr>

        </thead>

        <tbody>

            {% for usuario in usuarios %}

            <tr>

                <td>{{ usuario.nombre }}</td>

                <td>{{ usuario.correo }}</td>

                <td>{{ usuario.rol }}</td>

               <td>

    <a href="/usuario/editar/{{ usuario.id }}"
       class="btn btn-warning btn-sm">
        Editar
    </a>

    <a href="/usuario/eliminar/{{ usuario.id }}"
       class="btn btn-danger btn-sm"
       onclick="return confirm('¿Desea eliminar este usuario?');">
        Eliminar
    </a>

</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
