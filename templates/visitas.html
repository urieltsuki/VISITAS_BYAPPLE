{% extends 'base.html' %}

{% block titulo %}
Nueva Visita
{% endblock %}

{% block contenido %}

<h2>Nueva Visita</h2>

<form method="POST" enctype="multipart/form-data">

    <div class="mb-3">

        <label>Cliente</label>

        <input
            type="text"
            id="cliente_busqueda"
            class="form-control"
            list="clientesList"
            placeholder="Buscar por número o nombre"
            autocomplete="off"
            required>

        <datalist id="clientesList">

            {% for cliente in clientes %}

            <option value="{{ cliente.num_cliente }} - {{ cliente.nombre }}"></option>

            {% endfor %}

        </datalist>

        <input
            type="hidden"
            name="cliente_id"
            id="cliente_id">

    </div>

    <div class="mb-3">

        <label>Observaciones</label>

        <textarea
            name="observaciones"
            class="form-control"
            rows="5"></textarea>

    </div>

    <div class="mb-3">

        <label>

            <input
                type="checkbox"
                name="venta_realizada">

            ¿Hubo venta?

        </label>

    </div>

    <div class="mb-3">

        <label>Monto Venta</label>

        <input
            type="number"
            step="0.01"
            name="monto_venta"
            class="form-control">

    </div>

    <input
        type="hidden"
        name="latitud"
        id="latitud">

    <input
        type="hidden"
        name="longitud"
        id="longitud">

    <div class="mb-3">

        <label>Foto Evidencia</label>

        <input
            type="file"
            name="foto"
            accept="image/*"
            class="form-control">

    </div>

    <div class="mb-3">

        <label>Próxima Visita</label>

        
    <input
        type="date"
        name="proxima_visita"
        class="form-control"
        required>


    </div>

    <br>

    <button
        type="submit"
        class="btn btn-success">

        Guardar Visita

    </button>

</form>

<script>

// Obtener ubicación GPS
navigator.geolocation.getCurrentPosition(

    function(posicion){

        document.getElementById("latitud").value =
            posicion.coords.latitude;

        document.getElementById("longitud").value =
            posicion.coords.longitude;

    },

    function(error){

        console.log("No fue posible obtener la ubicación.");

    }

);

// Lista de clientes enviada desde Flask
const clientes = [

{% for cliente in clientes %}

{
    id: "{{ cliente.id }}",
    texto: "{{ cliente.num_cliente }} - {{ cliente.nombre }}"
},

{% endfor %}

];

// Buscar cliente y guardar su ID
const buscador = document.getElementById("cliente_busqueda");
const clienteId = document.getElementById("cliente_id");

buscador.addEventListener("input", function () {

    const valor = this.value.trim();

    const cliente = clientes.find(c => c.texto === valor);

    if (cliente) {

        clienteId.value = cliente.id;

    } else {

        clienteId.value = "";

    }

});

// Validar antes de enviar el formulario
document.querySelector("form").addEventListener("submit", function(e){

    if(clienteId.value === ""){

        alert("Debe seleccionar un cliente válido de la lista.");

        e.preventDefault();

    }

});

</script>

{% endblock %}
