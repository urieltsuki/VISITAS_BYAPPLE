{% extends 'base.html' %}

{% block titulo %}
Nueva Visita
{% endblock %}

{% block contenido %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-header bg-primary text-white py-3 rounded-top-4">

                <h3 class="mb-0">
                    <i class="bi bi-geo-alt-fill"></i>
                    Registrar Nueva Visita
                </h3>

                <small>Captura la información de la visita realizada al cliente.</small>

            </div>

            <div class="card-body p-4">

                <form method="POST" enctype="multipart/form-data">

                    <!-- Cliente -->
                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            <i class="bi bi-person-fill text-primary"></i>
                            Cliente
                        </label>

                        <input
                            type="text"
                            id="cliente_busqueda"
                            class="form-control form-control-lg"
                            list="clientesList"
                            placeholder="Buscar por número o nombre"
                            autocomplete="off"
                            required>

                        <datalist id="clientesList">
                            {% for cliente in clientes %}
                            <option value="{{ cliente.num_cliente }} - {{ cliente.nombre }}"></option>
                            {% endfor %}
                        </datalist>

                        <input
                            type="hidden"
                            name="cliente_id"
                            id="cliente_id">

                    </div>

                    <!-- Observaciones -->
                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            <i class="bi bi-chat-left-text-fill text-primary"></i>
                            Observaciones
                        </label>

                        <textarea
                            name="observaciones"
                            rows="5"
                            class="form-control"
                            placeholder="Escriba los detalles de la visita..."></textarea>

                    </div>

                    <!-- Venta -->
                    <div class="row">

                        <div class="col-md-4">

                            <div class="form-check form-switch mt-2">

                                <input
                                    class="form-check-input"
                                    type="checkbox"
                                    id="venta_realizada"
                                    name="venta_realizada">

                                <label class="form-check-label fw-semibold">

                                    ¿Hubo venta?

                                </label>

                            </div>

                        </div>

                        <div class="col-md-8">

                            <label class="form-label fw-semibold">

                                <i class="bi bi-currency-dollar text-success"></i>

                                Monto de la Venta

                            </label>

                            <input
                                type="number"
                                step="0.01"
                                name="monto_venta"
                                class="form-control">

                        </div>

                    </div>

                    <!-- Foto -->
                    <div class="mt-4">

                        <label class="form-label fw-semibold">

                            <i class="bi bi-camera-fill text-primary"></i>

                            Evidencia Fotográfica

                        </label>

                        <input
                            type="file"
                            name="foto"
                            accept="image/*"
                            class="form-control">

                    </div>

                    <!-- Próxima visita -->
                    <div class="mt-4">

                        <label class="form-label fw-semibold">

                            <i class="bi bi-calendar-event-fill text-primary"></i>

                            Próxima Visita

                        </label>

                        <input
                            type="date"
                            name="proxima_visita"
                            class="form-control"
                            required>

                    </div>

                    <input type="hidden" name="latitud" id="latitud">
                    <input type="hidden" name="longitud" id="longitud">

                    <hr class="my-4">

                    <div class="d-grid">

                        <button
                            type="submit"
                            class="btn btn-success btn-lg rounded-pill">

                            <i class="bi bi-check-circle-fill"></i>

                            Guardar Visita

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
