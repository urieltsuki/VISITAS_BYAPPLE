```html
{% extends 'base.html' %}

{% block contenido %}

<div class="container mt-4">

    <h2 class="mb-4">
        Editar Objetivo
    </h2>


    <form method="POST">


        <div class="mb-3">

            <label class="form-label">
                Usuario
            </label>

            <select 
                name="usuario_id"
                class="form-select"
                required>

                <option value="">
                    Seleccione un usuario
                </option>


                {% for u in usuarios %}

                <option
                    value="{{ u.id }}"
                    {% if u.id == objetivo.usuario_id %}
                    selected
                    {% endif %}
                >
                    {{ u.nombre }}
                </option>


                {% endfor %}

            </select>

        </div>



        <div class="mb-3">

            <label class="form-label">
                Año
            </label>

            <input
                type="number"
                name="anio"
                class="form-control"
                value="{{ objetivo.anio }}"
                min="2020"
                required
            >

        </div>



        <div class="mb-3">

            <label class="form-label">
                Mes
            </label>

            <input
                type="number"
                min="1"
                max="12"
                name="mes"
                class="form-control"
                value="{{ objetivo.mes }}"
                required
            >

        </div>



        <div class="mb-3">

            <label class="form-label">
                Objetivo
            </label>

            <input
                type="number"
                step="0.01"
                min="0"
                name="objetivo"
                class="form-control"
                value="{{ objetivo.objetivo or 0 }}"
                required
            >

        </div>



        <button 
            type="submit"
            class="btn btn-success">

            Guardar Cambios

        </button>


        <a 
            href="{{ url_for('objetivos') }}"
            class="btn btn-secondary">

            Cancelar

        </a>


    </form>

</div>


{% endblock %}
```
