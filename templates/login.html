<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bitácora de Visitas</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container">

        <div class="row justify-content-center align-items-center vh-100">

            <div class="col-md-4">

                <div class="card shadow">

                    <div class="card-header bg-primary text-white text-center">
                        <h3>Bitácora de Visitas</h3>
                    </div>

                    <div class="card-body">

                        <h5 class="text-center mb-4">
                            Iniciar Sesión
                        </h5>

                        <form method="POST">

                            <div class="mb-3">
                                <label class="form-label">
                                    Correo
                                </label>

                                <input
                                    type="email"
                                    name="correo"
                                    class="form-control"
                                    placeholder="correo@applecosmetics.com.mx"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">
                                    Contraseña
                                </label>

                                <input
                                    type="password"
                                    name="password"
                                    class="form-control"
                                    required>
                            </div>

                            <button
                                type="submit"
                                class="btn btn-primary w-100">
                                Entrar
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
