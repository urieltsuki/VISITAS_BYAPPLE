<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}{% endblock %}</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>

        body{
            margin:0;
        }

        .sidebar{
            width:250px;
            height:100vh;
            background:#212529;
            position:fixed;
            left:0;
            top:0;
        }

        .sidebar h4{
            color:white;
            padding:20px;
            text-align:center;
            border-bottom:1px solid #444;
        }

        .sidebar a{
            color:white;
            text-decoration:none;
            display:block;
            padding:12px 20px;
        }

        .sidebar a:hover{
            background:#343a40;
        }

        .contenido{
            margin-left:250px;
            padding:20px;
        }

    </style>

</head>

<body>

    <div class="sidebar">

    <h4>Bitácora</h4>
    
<div class="text-white text-center p-3">

    <strong>
        {{ current_user.nombre }}
    </strong>

    <br>

    {{ current_user.rol }}

</div


    <a href="/dashboard">
        Dashboard
    </a>

    {% if current_user.rol == 'admin' %}

        <a href="/clientes">
            Clientes
        </a>

        <a href="/usuarios">
            Usuarios
        </a>

        <a href="/reportes">
            Reportes
        </a>

    {% endif %}

    <a href="/visitas">
        Visitas
    </a>

    <a href="/logout">
        Cerrar Sesión
    </a>

</div>

    <div class="contenido">

        {% block contenido %}
        {% endblock %}

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
