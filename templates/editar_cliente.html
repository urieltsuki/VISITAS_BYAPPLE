<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cliente</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Editar Cliente</h2>

    <form method="POST">

        <div class="mb-3">
            <label>No. Cliente</label>
            <input type="text"
                   name="num_cliente"
                   class="form-control"
                   value="{{ cliente.num_cliente }}"
                   required>
        </div>

        <div class="mb-3">
            <label>Nombre</label>
            <input type="text"
                   name="nombre"
                   class="form-control"
                   value="{{ cliente.nombre }}"
                   required>
        </div>

        <div class="mb-3">
            <label>Grupo</label>
            <input type="text"
                   name="grupo"
                   class="form-control"
                   value="{{ cliente.grupo }}">
        </div>

        <div class="mb-3">
            <label>Canal</label>
            <input type="text"
                   name="canal"
                   class="form-control"
                   value="{{ cliente.canal }}">
        </div>

        <div class="mb-3">
            <label>Vendedor</label>
            <input type="text"
                   name="vendedor"
                   class="form-control"
                   value="{{ cliente.vendedor }}">
        </div>

        <button type="submit" class="btn btn-success">
            Guardar Cambios
        </button>

        <a href="/clientes" class="btn btn-secondary">
            Regresar
        </a>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
